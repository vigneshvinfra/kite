apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: infra-dev
  namespace: argocd
spec:
  description: Platform / infrastructure components (dev)
  sourceRepos:
    - git@github.com:vigneshvinfra/kite.git
    - https://kubernetes.github.io/ingress-nginx
  destinations:
    - name: dev
      namespace: '*'
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
