# Identity used by the prod Argo CD to manage a remote Kubernetes cluster.
# Applied on the dev k3s cluster by terraform/dev/cloud-init.sh on first boot.
# The token Secret is populated automatically by the kubernetes token controller
# and read back by `argocd/cluster/argo-dev-cluster.sh` to render the registration.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argocd-manager
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argocd-manager-role-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: argocd-manager
    namespace: kube-system
---
apiVersion: v1
kind: Secret
metadata:
  name: argocd-manager-token
  namespace: kube-system
  annotations:
    kubernetes.io/service-account.name: argocd-manager
type: kubernetes.io/service-account-token
