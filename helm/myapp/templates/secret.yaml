{{- if .Values.secrets.enabled -}}
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: myapp-secrets
spec:
  provider: aws
  {{- with .Values.secrets.syncedSecrets }}
  secretObjects:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  parameters:
    usePodIdentity: "true"
    objects: |
{{- toYaml .Values.secrets.objects | nindent 6 }}
{{- end }}
