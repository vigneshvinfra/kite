{{- if .Values.secrets.enabled -}}
{{- if not (.Capabilities.APIVersions.Has "secrets-store.csi.x-k8s.io/v1") -}}
{{- fail "secrets.enabled=true but the secrets-store.csi.x-k8s.io/v1 API is not installed in the cluster. Install the Secrets Store CSI Driver first." -}}
{{- end }}
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: myapp-secrets
spec:
  provider: aws
  parameters:
    usePodIdentity: "true"
    objects: |
{{- toYaml .Values.secrets.objects | nindent 6 }}
{{- end }}
