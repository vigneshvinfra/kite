replicaCount: 1

image:
  repository: ghcr.io/vigneshvinfra/myapp
  tag: 629ca59
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

ingress:
  enabled: true
  className: nginx
  host: myapp.localhost
  tls:
    enabled: false
    secretName: ""
  annotations: {}

# Pod-level security context. UID/GID 65532 matches the distroless
# `nonroot` user baked into the image (Dockerfile `USER nonroot:nonroot`),
# so runAsNonRoot is enforced at the K8s layer, not just by convention.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

# Container-level hardening. The app writes nothing to disk, so the root
# filesystem can be read-only.
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

# When enabled, the HPA owns spec.replicas and the Deployment omits it
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 0
  behavior: {}

commonLabels:
  team: devops

rbac:
  create: false
  rules: []

secrets:
  enabled: false
  objects: []
  syncedSecrets: []
  envFromSecretName: ""

networkPolicy:
  enabled: false

# PodDisruptionBudget — keep a floor of healthy pods during voluntary
# disruptions (node drains, cluster upgrades, autoscaler scale-down).
pdb:
  enabled: false
  minAvailable: 1

# Spread replicas across failure domains so a single node/zone loss
# never takes out all of them. labelSelector is injected from the
# selectorLabels helper, so it can't drift from the pod labels.
topologySpreadConstraints: []

metrics:
  serviceMonitor:
    enabled: false
  dashboard:
    enabled: false
  alerts:
    enabled: false
