replicaCount: 1

image:
  repository: ghcr.io/vigneshvinfra/myapp
  tag: 629ca59
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

ingress:
  enabled: true
  className: nginx
  host: myapp.localhost
  tls:
    enabled: false
    secretName: ""
  annotations: {}

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

commonLabels:
  team: devops

rbac:
  create: false
  rules: []

secrets:
  enabled: false
  objects: []
  syncedSecrets: []
  envFromSecretName: ""

networkPolicy:
  enabled: false

metrics:
  serviceMonitor:
    enabled: false
  dashboard:
    enabled: false
  alerts:
    enabled: false
