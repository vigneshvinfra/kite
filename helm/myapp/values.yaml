replicaCount: 1

image:
  repository: ghcr.io/vigneshvinfra/myapp
  tag: 629ca59
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

ingress:
  enabled: true
  className: nginx
  host: myapp.localhost
  tls:
    enabled: false
    secretName: ""
  annotations: {}

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

commonLabels:
  team: devops

rbac:
  create: false
  rules: []

secrets:
  enabled: false
  objects: []
  syncedSecrets: []
  envFromSecretName: ""

networkPolicy:
  enabled: false

# PodDisruptionBudget — keep a floor of healthy pods during voluntary
# disruptions (node drains, cluster upgrades, autoscaler scale-down).
pdb:
  enabled: false
  minAvailable: 1

# Spread replicas across failure domains so a single node/zone loss
# never takes out all of them. labelSelector is injected from the
# selectorLabels helper, so it can't drift from the pod labels.
topologySpreadConstraints: []

metrics:
  serviceMonitor:
    enabled: false
  dashboard:
    enabled: false
  alerts:
    enabled: false
