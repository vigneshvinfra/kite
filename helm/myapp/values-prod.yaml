replicaCount: 3

image:
  tag: 1e2f27c

env:
  ENV: prod

commonLabels:
  environment: prod  

ingress:
  host: ""
  tls:
    enabled: false
    secretName: myapp-tls
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    external-dns.alpha.kubernetes.io/ttl: "300"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

secrets:
  enabled: true
  objects:
    - objectName: "prod/myapp/api-key"
      objectType: secretsmanager
      objectAlias: API_KEY
    - objectName: "prod/myapp/config"
      objectType: secretsmanager
      objectAlias: config.json
      filePermission: "0444"

  syncedSecrets:
    - secretName: myapp-env
      type: Opaque
      data:
        - objectName: API_KEY
          key: API_KEY

  envFromSecretName: myapp-env

metrics:
  serviceMonitor:
    enabled: true
  dashboard:
    enabled: true
  alerts:
    enabled: true

networkPolicy:
  enabled: true
  ingressNamespace: ingress-nginx
  ingressPodSelector: {}
  monitoringNamespace: monitoring
  allowHTTPSEgress: false
  otelCollector:
    enabled: false
    namespace: observability
    port: 4317

# With replicaCount: 3, keep at least 2 serving during a node drain
# (so a drain evicts at most one pod at a time).
pdb:
  enabled: true
  minAvailable: 2

# Hard-spread one pod per node (we run >=3 nodes); best-effort across zones.
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: DoNotSchedule
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: ScheduleAnyway
