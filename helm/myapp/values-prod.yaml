replicaCount: 3

image:
  tag: "0738273"

env:
  ENV: prod

commonLabels:
  environment: prod  

ingress:
  host: ""
  tls:
    enabled: false
    secretName: myapp-tls
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    external-dns.alpha.kubernetes.io/ttl: "300"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

secrets:
  enabled: true
  objects:
    - objectName: "prod/myapp/api-key"
      objectType: secretsmanager
      objectAlias: API_KEY
    - objectName: "prod/myapp/config"
      objectType: secretsmanager
      objectAlias: config.json
      filePermission: "0444"

  syncedSecrets:
    - secretName: myapp-env
      type: Opaque
      data:
        - objectName: API_KEY
          key: API_KEY

  envFromSecretName: myapp-env

metrics:
  serviceMonitor:
    enabled: true
  dashboard:
    enabled: true
  alerts:
    enabled: true

networkPolicy:
  enabled: true
  ingressNamespace: ingress-nginx
  ingressPodSelector: {}
  monitoringNamespace: monitoring
  allowHTTPSEgress: false
  otelCollector:
    enabled: false
    namespace: observability
    port: 4317
