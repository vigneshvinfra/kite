apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: grafana-secrets
spec:
  provider: aws
  # Materialize a Kubernetes Secret named `grafana-admin` with keys
  # `admin-user` and `admin-password`, matching the kube-prometheus-stack
  # grafana subchart's `admin.existingSecret` expectations.
  secretObjects:
    - secretName: grafana-admin
      type: Opaque
      data:
        - objectName: admin-user
          key: admin-user
        - objectName: admin-password
          key: admin-password
  parameters:
    usePodIdentity: "true"
    # The AWS SM secret stores a JSON document like:
    #   {"user": "<admin-user>", "password": "<admin-password>"}
    # JMESPath extracts each field; objectAlias becomes the source name
    # for `secretObjects` above.
    objects: |
      - objectName: "prod/grafana/admin"
        objectType: secretsmanager
        jmesPath:
          - path: user
            objectAlias: admin-user
          - path: password
            objectAlias: admin-password
