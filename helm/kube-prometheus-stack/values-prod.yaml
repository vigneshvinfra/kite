kube-prometheus-stack:
  prometheus:
    prometheusSpec:
      retention: 15d
      retentionSize: "40GiB"
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: gp3
            resources:
              requests:
                storage: 50Gi
      resources:
        limits:
          memory: 4Gi
        requests:
          memory: 2Gi
          cpu: 500m

  grafana:
    admin:
      existingSecret: grafana-admin
      userKey: admin-user
      passwordKey: admin-password
    extraVolumes:
      - name: secrets-store
        csi:
          driver: secrets-store.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: grafana-secrets
    extraVolumeMounts:
      - name: secrets-store
        mountPath: /mnt/secrets-store
        readOnly: true
    ingress:
      enabled: true
      ingressClassName: nginx
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
        external-dns.alpha.kubernetes.io/ttl: "300"
        nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
      hosts:
        - grafana.example.com
      path: /
      pathType: Prefix
      tls:
        - secretName: grafana-tls
          hosts:
            - grafana.example.com
