---
name: Build & Push Docker
description: Build a Dockerfile and publish to the registry

inputs:
  registry:
    description: Docker registry service
    default: ghcr.io
  username:
    description: Username for https://ghcr.io
    required: true
  password:
    description: Password for https://ghcr.io
    required: true
  image:
    description: Image name with provider url
    required: true
  dockerfile:
    description: Path to the Dockerfile
    required: true
  context:
    description: Path to the Context
    default: .
    required: true
  build-args:
    description: List of build-time variables
    required: false
  platforms:
    description: Comma-separated list of target platforms
    required: false
    default: linux/amd64,linux/arm64

outputs:
  image:
    description: Image url
    value: ${{ steps.imageOutput.outputs.imageUrl }}
  imageid:
    description: Image ID
    value: ${{ steps.publish.outputs.imageid }}
  digest:
    description: Image digest
    value: ${{ steps.publish.outputs.digest }}
  metadata:
    description: Build result metadata
    value: ${{ steps.publish.outputs.metadata }}

runs:
  using: composite
  steps:
    - name: Log in to the ghcr.io registry
      uses: docker/login-action@v3
      with:
        registry: ${{ inputs.registry }}
        username: ${{ inputs.username }}
        password: ${{ inputs.password }}
        logout: false

    - name: Docker meta
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: |
          ${{ inputs.image }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix=
          type=semver,pattern={{raw}}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push the image to ghcr.io
      uses: docker/build-push-action@v6
      id: publish
      with:
        context: ${{ inputs.context }}
        file: ${{ inputs.dockerfile }}
        push: true
        platforms: ${{ inputs.platforms }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        annotations: ${{ steps.meta.outputs.annotations }}
        build-args: ${{ inputs.build-args }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - id: imageOutput
      shell: bash
      run: |-
        echo "imageUrl=${{ fromJSON(steps.publish.outputs.metadata)['image.name'] }}" >> $GITHUB_OUTPUT

    - name: Build Summary
      shell: bash
      env:
        IMAGE: ${{ inputs.image }}
        TAGS: ${{ steps.meta.outputs.tags }}
        DIGEST: ${{ steps.publish.outputs.digest }}
        IMAGE_ID: ${{ steps.publish.outputs.imageid }}
      run: |
        {
          echo "---"
          echo "### Docker Build Summary"
          echo "| Detail | Value |"
          echo "|--------|-------|"
          echo "| Image | \`$IMAGE\` |"
          echo "| Tags | \`$(echo "$TAGS" | tr '\n' ' ')\` |"
          echo "| Digest | \`$DIGEST\` |"
          echo "| Image ID | \`$IMAGE_ID\` |"
        } >> "$GITHUB_STEP_SUMMARY"