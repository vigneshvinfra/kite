name: Build and publish Docker image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - 'argocd/**'
      - 'helm/**'
      - '**/*.md'
  release:
    types: [published]

permissions:
  contents: write
  packages: write
  security-events: write
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-publish-image:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      short_sha: ${{ steps.sha.outputs.short_sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Get short SHA
        id: sha
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build and push myapp docker image (${{ steps.sha.outputs.short_sha }})
        uses: ./.github/actions/docker-publish
        id: publish
        with:
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
          image: ghcr.io/${{ github.repository_owner }}/myapp
          dockerfile: Dockerfile
          context: .

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/myapp:${{ steps.sha.outputs.short_sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true

      - name: Upload Trivy results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Bump dev image tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          NEW_TAG: ${{ steps.sha.outputs.short_sha }}
        run: |
          set -euo pipefail
          sed -i "s/^  tag: .*/  tag: ${NEW_TAG}/" helm/myapp/values-dev.yaml
          if git diff --quiet helm/myapp/values-dev.yaml; then
            echo "values-dev.yaml already at ${NEW_TAG}, nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add helm/myapp/values-dev.yaml
          git commit -m "chore(dev): bump myapp image to ${NEW_TAG} [skip ci]"
          git pull --rebase origin main
          git push origin HEAD:main
